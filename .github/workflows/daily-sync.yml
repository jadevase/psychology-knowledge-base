name: Daily Psychology Lesson Sync

on:
  schedule:
    # 每天 UTC 时间 9:30 执行（北京时间 17:30）
    - cron: '30 9 * * *'
  workflow_dispatch:
    # 允许手动触发

jobs:
  sync-lesson:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
      
      - name: Read current progress
        id: progress
        run: |
          # 读取 index.json 中的 current_day
          CURRENT_DAY=$(python -c "import json; data=json.load(open('index.json')); print(data['current_day'])")
          NEXT_DAY=$((CURRENT_DAY + 1))
          echo "current_day=$CURRENT_DAY" >> $GITHUB_OUTPUT
          echo "next_day=$NEXT_DAY" >> $GITHUB_OUTPUT
          echo "当前学习到第 $CURRENT_DAY 天，明天将生成第 $NEXT_DAY 天内容"
      
      - name: Generate next lesson
        run: |
          # 运行同步脚本生成下一天的内容
          python sync_simple.py ${{ steps.progress.outputs.next_day }}
          
          # 验证文件是否生成成功
          if [ -f "daily-lessons/day-${{ steps.progress.outputs.next_day }}.md" ]; then
            echo "✓ 学习内容生成成功"
          else
            echo "✗ 学习内容生成失败"
            exit 1
          fi
          
          if [ -f "practice-questions/day-${{ steps.progress.outputs.next_day }}-questions.md" ]; then
            echo "✓ 练习题生成成功"
          else
            echo "✗ 练习题生成失败"
            exit 1
          fi
      
      - name: Update index.json
        run: |
          # 更新索引文件中的进度
          python -c "
          import json
          
          with open('index.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          
          # 更新进度
          data['current_day'] = ${{ steps.progress.outputs.next_day }}
          data['total_lessons'] = ${{ steps.progress.outputs.next_day }}
          data['last_updated'] = '$(date +%Y-%m-%d)'
          
          with open('index.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          
          print('✓ 索引文件已更新')
          "
      
      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          git add daily-lessons/ practice-questions/ index.json
          
          if git diff --staged --quiet; then
            echo "没有变化需要提交"
          else
            git commit -m "feat: 添加第 ${{ steps.progress.outputs.next_day }} 天学习内容 [skip ci]
            
            自动生成的学习内容：
            - 课程主题：详见 daily-lessons/day-${{ steps.progress.outputs.next_day }}.md
            - 配套练习：详见 practice-questions/day-${{ steps.progress.outputs.next_day }}-questions.md
            
            Generated by GitHub Actions on $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin main
            echo "✓ 已提交并推送到仓库"
          fi
      
      - name: Create release tag (每 30 天一个版本)
        if: ${{ steps.progress.outputs.next_day % 30 == 0 }}
        run: |
          STAGE_NUM=$(((${{ steps.progress.outputs.next_day }} - 1) / 30 + 1))
          TAG_NAME="stage-${STAGE_NUM}-day-${{ steps.progress.outputs.next_day }}"
          
          git tag -a "$TAG_NAME" -m "完成第 ${STAGE_NUM} 阶段学习 - Day ${{ steps.progress.outputs.next_day }}"
          git push origin "$TAG_NAME"
          echo "✓ 已创建版本标签：$TAG_NAME"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: psychology-lessons-day-${{ steps.progress.outputs.next_day }}
          path: |
            daily-lessons/day-${{ steps.progress.outputs.next_day }}.md
            practice-questions/day-${{ steps.progress.outputs.next_day }}-questions.md
          retention-days: 30
